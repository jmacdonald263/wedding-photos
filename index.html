<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hannah &amp; Jamie &middot; Share your photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tus-js-client@4.3.1/dist/tus.min.js"></script>
</head>
<body>
<style>
  :root {
    --parchment: #F6EFE2;
    --ink: #123A3A;
    --teal: #1C4E4A;
    --ember: #C2562A;
    --ember-soft: #D97A4E;
    --stone: #8A8073;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--parchment);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 2rem 1.25rem 4rem;
  }

  .page {
    width: 100%;
    max-width: 30rem;
  }

  .eyebrow {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--stone);
    margin: 0 0 0.75rem;
  }

  .names {
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 600;
    color: var(--ink);
    font-size: clamp(2.75rem, 12vw, 4rem);
    line-height: 1.02;
    margin: 0;
  }

  .divider {
    display: block;
    margin: 0.85rem auto 1.1rem;
    width: 11rem;
    max-width: 70%;
    height: auto;
    color: var(--ember);
  }

  .instruction {
    text-align: center;
    color: var(--stone);
    font-size: 1.02rem;
    line-height: 1.5;
    margin: 0 auto 2rem;
    max-width: 24rem;
  }

  .choose-button {
    display: block;
    width: 100%;
    border: none;
    border-radius: 0.75rem;
    background: var(--ember);
    color: var(--parchment);
    font-family: inherit;
    font-size: 1.15rem;
    font-weight: 600;
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    transition: background-color 0.18s ease;
  }

  .choose-button:hover { background: var(--ember-soft); }

  .choose-button:focus-visible {
    outline: 3px solid var(--teal);
    outline-offset: 2px;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0 0 0 0);
    border: 0;
  }

  .upload-list {
    list-style: none;
    margin: 1.75rem 0 0;
    padding: 0;
  }

  .empty-state {
    text-align: center;
    color: var(--stone);
    font-size: 0.95rem;
    font-style: italic;
    margin: 1.75rem 0 0;
  }

  .upload-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid rgba(138, 128, 115, 0.28);
  }

  .upload-row .file-name {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.95rem;
    color: var(--ink);
  }

  .upload-row .file-status {
    flex: 0 0 auto;
    font-size: 0.85rem;
    color: var(--stone);
    text-align: right;
  }

  .upload-row .file-status.is-done { color: var(--ember); font-weight: 600; }
  .upload-row .file-status.is-failed { color: var(--ember); }
  .upload-row .file-status.is-skipped { color: var(--stone); }

  .retry-button {
    border: none;
    background: none;
    color: var(--ember);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }

  .retry-button:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  .text-link {
    display: block;
    margin: 1.75rem auto 0;
    border: none;
    background: none;
    color: var(--ember);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
    padding: 0.25rem;
  }

  .text-link:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  .gallery-status {
    text-align: center;
    color: var(--stone);
    font-size: 0.95rem;
    margin: 1.5rem 0 0;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(6rem, 1fr));
    gap: 0.5rem;
    margin-top: 1.25rem;
  }

  .gallery-tile {
    position: relative;
    display: block;
    aspect-ratio: 1 / 1;
    border-radius: 0.5rem;
    overflow: hidden;
    background: rgba(138, 128, 115, 0.18);
  }

  .gallery-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .gallery-tile:focus-visible {
    outline: 3px solid var(--teal);
    outline-offset: 2px;
  }

  .gallery-tile .play-badge {
    position: absolute;
    right: 0.4rem;
    bottom: 0.4rem;
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 50%;
    background: rgba(18, 58, 58, 0.72);
    color: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    line-height: 1;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(18, 58, 58, 0.94);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox[hidden] { display: none; }

  .lightbox-stage {
    max-width: 92vw;
    max-height: 84vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-stage img {
    max-width: 92vw;
    max-height: 84vh;
    object-fit: contain;
    border-radius: 0.4rem;
  }

  .lightbox-stage iframe {
    width: min(92vw, 80rem);
    height: 84vh;
    border: none;
    border-radius: 0.4rem;
  }

  .lightbox-control {
    position: absolute;
    border: none;
    background: rgba(246, 239, 226, 0.14);
    color: var(--parchment);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .lightbox-control:hover { background: rgba(246, 239, 226, 0.26); }

  .lightbox-control:focus-visible {
    outline: 3px solid var(--ember-soft);
    outline-offset: 2px;
  }

  .lightbox-prev,
  .lightbox-next {
    top: 50%;
    transform: translateY(-50%);
    width: 3rem;
    height: 3rem;
    font-size: 2rem;
    line-height: 1;
  }

  .lightbox-prev { left: 0.6rem; }
  .lightbox-next { right: 0.6rem; }

  .lightbox-close {
    top: 0.8rem;
    right: 0.8rem;
    width: 2.6rem;
    height: 2.6rem;
    font-size: 1.7rem;
    line-height: 1;
  }

  .lightbox-play {
    top: 0.8rem;
    left: 0.8rem;
    width: 2.6rem;
    height: 2.6rem;
    font-size: 1rem;
    line-height: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<main class="page">
  <p class="eyebrow">18 July 2026</p>
  <h1 class="names">Hannah &amp; Jamie</h1>

  <!-- Signature motif: a single thin hand-drawn coastline wave in ember -->
  <svg class="divider" viewBox="0 0 220 16" fill="none" aria-hidden="true">
    <path d="M2 9 C 24 2, 40 2, 58 8 S 96 14, 116 8 S 158 2, 178 8 S 208 13, 218 7"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>

  <p class="instruction">Share your photos and videos from the day. Pick as many as you like.</p>

  <section id="uploadView">
    <button type="button" class="choose-button" id="chooseButton">Choose photos or videos</button>
    <input
      type="file"
      id="fileInput"
      class="visually-hidden"
      accept="image/*,video/*"
      multiple>

    <p class="empty-state" id="emptyState">Your photos will appear here as they upload.</p>
    <ul class="upload-list" id="uploadList" aria-live="polite"></ul>

    <button type="button" class="text-link" id="showGalleryButton">View all photos</button>
  </section>

  <section id="galleryView" hidden>
    <button type="button" class="text-link" id="showUploadButton">&larr; Add your photos</button>
    <p class="gallery-status" id="galleryStatus">Loading photos&hellip;</p>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</main>

<div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button type="button" class="lightbox-control lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <button type="button" class="lightbox-control lightbox-play" id="lightboxPlay" aria-label="Start slideshow">&#9654;</button>
  <button type="button" class="lightbox-control lightbox-prev" id="lightboxPrev" aria-label="Previous">&lsaquo;</button>
  <div class="lightbox-stage" id="lightboxStage"></div>
  <button type="button" class="lightbox-control lightbox-next" id="lightboxNext" aria-label="Next">&rsaquo;</button>
</div>

<script>
  // Base URL of the Cloudflare Worker that streams uploads into Drive.
  const workerBaseUrl = "https://wedding-photos-uploader.jmacd263-vinyl-scrobbler.workers.dev";

  // tus uploads in chunks so a dropped connection resumes rather than restarts.
  // 8 MB is a multiple of 256 KB, which Drive's resumable upload requires.
  const tusChunkSizeInBytes = 8 * 1024 * 1024;

  const chooseButton = document.getElementById("chooseButton");
  const fileInput = document.getElementById("fileInput");
  const uploadList = document.getElementById("uploadList");
  const emptyState = document.getElementById("emptyState");

  const uploadView = document.getElementById("uploadView");
  const galleryView = document.getElementById("galleryView");
  const showGalleryButton = document.getElementById("showGalleryButton");
  const showUploadButton = document.getElementById("showUploadButton");
  const galleryStatus = document.getElementById("galleryStatus");
  const galleryGrid = document.getElementById("galleryGrid");

  const lightbox = document.getElementById("lightbox");
  const lightboxStage = document.getElementById("lightboxStage");
  const lightboxClose = document.getElementById("lightboxClose");
  const lightboxPrev = document.getElementById("lightboxPrev");
  const lightboxNext = document.getElementById("lightboxNext");
  const lightboxPlay = document.getElementById("lightboxPlay");

  const slideshowIntervalInMilliseconds = 4000;
  let loadedGalleryFiles = [];
  let lightboxIndex = 0;
  let slideshowTimerId = null;

  // Single sequential queue. Island signal can be patchy, so we upload one
  // file at a time rather than firing everything in parallel.
  const uploadQueue = [];
  let isProcessingQueue = false;

  chooseButton.addEventListener("click", function () {
    fileInput.click();
  });

  fileInput.addEventListener("change", function () {
    const selectedFiles = Array.from(fileInput.files);
    for (const selectedFile of selectedFiles) {
      addFileToQueue(selectedFile);
    }
    // Reset so picking the same file again still fires a change event.
    fileInput.value = "";
    processQueue();
  });

  function addFileToQueue(selectedFile) {
    emptyState.style.display = "none";

    const rowElement = document.createElement("li");
    rowElement.className = "upload-row";

    const fileNameElement = document.createElement("span");
    fileNameElement.className = "file-name";
    fileNameElement.textContent = selectedFile.name;

    const fileStatusElement = document.createElement("span");
    fileStatusElement.className = "file-status";

    rowElement.appendChild(fileNameElement);
    rowElement.appendChild(fileStatusElement);
    uploadList.appendChild(rowElement);

    fileStatusElement.textContent = "Pending";

    uploadQueue.push({
      file: selectedFile,
      statusElement: fileStatusElement,
    });
  }

  async function processQueue() {
    if (isProcessingQueue) {
      return;
    }
    isProcessingQueue = true;

    while (uploadQueue.length > 0) {
      const queueItem = uploadQueue.shift();
      await uploadSingleFile(queueItem);
    }

    isProcessingQueue = false;
  }

  // tus-js-client handles the chunking, progress, retries and resume-after-drop.
  // The Worker turns the tus protocol into a Drive resumable upload.
  // If an upload makes no progress for this long, treat it as stalled. tus only
  // retries on an error, but a silently hung connection never errors, so without
  // this a stalled upload would sit at 0% forever.
  const uploadStallTimeoutInMilliseconds = 45000;

  function uploadSingleFile(queueItem) {
    return new Promise(function (resolve) {
      const { file, statusElement } = queueItem;

      statusElement.className = "file-status";
      statusElement.textContent = "Uploading";

      let hasSettled = false;
      let lastProgressTime = Date.now();
      let stallWatchdogId = null;

      const settle = function (finalAction) {
        if (hasSettled) {
          return;
        }
        hasSettled = true;
        if (stallWatchdogId !== null) {
          window.clearInterval(stallWatchdogId);
        }
        finalAction();
        resolve();
      };

      const upload = new tus.Upload(file, {
        endpoint: workerBaseUrl + "/",
        chunkSize: tusChunkSizeInBytes,
        retryDelays: [0, 1000, 3000, 5000, 10000, 20000],
        // Some networks/security software block the HTTP PATCH method outright,
        // which leaves the upload stuck at 0%. Send PATCH as a POST carrying an
        // X-HTTP-Method-Override header so those networks let it through.
        overridePatchMethod: true,
        // Forget the upload once done, so re-picking a file never tries to
        // resume an already-finished (or expired) Drive session.
        removeFingerprintOnSuccess: true,
        metadata: {
          filename: file.name,
          filetype: resolveFileType(file),
        },
        onProgress: function (bytesUploaded, bytesTotal) {
          lastProgressTime = Date.now();
          statusElement.textContent = "Uploading " + Math.round((bytesUploaded / bytesTotal) * 100) + "%";
        },
        onSuccess: function () {
          settle(function () {
            markRowAsDone(statusElement);
          });
        },
        onError: function (error) {
          settle(function () {
            markRowAsFailed(statusElement, queueItem, describeUploadError(error));
          });
        },
      });

      stallWatchdogId = window.setInterval(function () {
        if (Date.now() - lastProgressTime > uploadStallTimeoutInMilliseconds) {
          try {
            upload.abort();
          } catch (ignored) {
            // ignore; we are failing the row regardless
          }
          settle(function () {
            markRowAsFailed(statusElement, queueItem, "stalled");
          });
        }
      }, 5000);

      upload.start();
    });
  }

  // Some phones report an empty type for videos or HEIC photos; infer one from
  // the file extension so the upload is not rejected.
  const extensionFileTypes = {
    heic: "image/heic", heif: "image/heif", jpg: "image/jpeg", jpeg: "image/jpeg",
    png: "image/png", gif: "image/gif", webp: "image/webp", bmp: "image/bmp",
    tif: "image/tiff", tiff: "image/tiff", mov: "video/quicktime", mp4: "video/mp4",
    m4v: "video/mp4", "3gp": "video/3gpp", avi: "video/x-msvideo",
    mkv: "video/x-matroska", webm: "video/webm",
  };

  function resolveFileType(file) {
    if (file.type) {
      return file.type;
    }
    const extension = file.name.split(".").pop().toLowerCase();
    return extensionFileTypes[extension] || "application/octet-stream";
  }

  function describeUploadError(error) {
    try {
      if (error && error.originalResponse) {
        return "error " + error.originalResponse.getStatus();
      }
    } catch (ignored) {
      // fall through to the generic message
    }
    return "";
  }

  function markRowAsDone(statusElement) {
    statusElement.className = "file-status is-done";
    statusElement.textContent = "Uploaded ✓";
  }

  function markRowAsFailed(statusElement, queueItem, reason) {
    statusElement.className = "file-status is-failed";
    statusElement.textContent = "";

    const retryButton = document.createElement("button");
    retryButton.type = "button";
    retryButton.className = "retry-button";
    retryButton.textContent = reason
      ? "Upload failed (" + reason + "). Tap to try again."
      : "Upload failed. Tap to try again.";
    retryButton.addEventListener("click", function () {
      retryButton.remove();
      uploadQueue.push(queueItem);
      processQueue();
    });

    statusElement.appendChild(retryButton);
  }

  showGalleryButton.addEventListener("click", function () {
    uploadView.hidden = true;
    galleryView.hidden = false;
    loadGallery();
  });

  showUploadButton.addEventListener("click", function () {
    galleryView.hidden = true;
    uploadView.hidden = false;
  });

  async function loadGallery() {
    galleryGrid.textContent = "";
    galleryStatus.hidden = false;
    galleryStatus.textContent = "Loading photos…";

    try {
      const response = await fetch(workerBaseUrl + "/gallery", { method: "GET" });
      const parsedResponse = JSON.parse(await response.text());

      if (parsedResponse.status !== "success") {
        throw new Error("Gallery request did not succeed.");
      }

      loadedGalleryFiles = parsedResponse.files;
      if (loadedGalleryFiles.length === 0) {
        galleryStatus.textContent = "No photos yet. Be the first to add some.";
        return;
      }

      galleryStatus.hidden = true;
      loadedGalleryFiles.forEach(function (galleryFile, fileIndex) {
        galleryGrid.appendChild(buildGalleryTile(galleryFile, fileIndex));
      });
    } catch (loadError) {
      galleryStatus.hidden = false;
      galleryStatus.textContent = "Could not load the gallery. Tap the link above to try again.";
    }
  }

  function buildGalleryTile(galleryFile, fileIndex) {
    const tileButton = document.createElement("button");
    tileButton.type = "button";
    tileButton.className = "gallery-tile";
    tileButton.setAttribute("aria-label", galleryFile.name);
    tileButton.addEventListener("click", function () {
      openLightbox(fileIndex);
    });

    const thumbnailImage = document.createElement("img");
    thumbnailImage.loading = "lazy";
    thumbnailImage.alt = "";
    thumbnailImage.src = "https://drive.google.com/thumbnail?id=" + galleryFile.id + "&sz=w600";
    // Drive can take a few seconds to generate a thumbnail after upload. Until
    // it exists the request 404s, so hide the broken image and leave the tile
    // as a quiet placeholder rather than showing a broken-image icon.
    thumbnailImage.addEventListener("error", function () {
      thumbnailImage.style.display = "none";
    });

    tileButton.appendChild(thumbnailImage);

    if (isVideoFile(galleryFile)) {
      const playBadge = document.createElement("span");
      playBadge.className = "play-badge";
      playBadge.textContent = "▶";
      tileButton.appendChild(playBadge);
    }

    return tileButton;
  }

  function isVideoFile(galleryFile) {
    return galleryFile.mimeType.indexOf("video/") === 0;
  }

  function openLightbox(fileIndex) {
    lightboxIndex = fileIndex;
    lightbox.hidden = false;
    renderLightbox();
    lightboxClose.focus();
  }

  function closeLightbox() {
    stopSlideshow();
    lightbox.hidden = true;
    lightboxStage.textContent = "";
  }

  function renderLightbox() {
    const galleryFile = loadedGalleryFiles[lightboxIndex];
    lightboxStage.textContent = "";

    if (isVideoFile(galleryFile)) {
      // A video pauses the slideshow so it can be watched in full.
      stopSlideshow();
      const videoFrame = document.createElement("iframe");
      videoFrame.src = "https://drive.google.com/file/d/" + galleryFile.id + "/preview";
      videoFrame.allow = "autoplay";
      videoFrame.setAttribute("allowfullscreen", "");
      lightboxStage.appendChild(videoFrame);
      return;
    }

    const fullImage = document.createElement("img");
    fullImage.alt = galleryFile.name;
    fullImage.src = "https://drive.google.com/thumbnail?id=" + galleryFile.id + "&sz=w1600";
    lightboxStage.appendChild(fullImage);
  }

  function showNextItem() {
    lightboxIndex = (lightboxIndex + 1) % loadedGalleryFiles.length;
    renderLightbox();
  }

  function showPreviousItem() {
    lightboxIndex = (lightboxIndex - 1 + loadedGalleryFiles.length) % loadedGalleryFiles.length;
    renderLightbox();
  }

  function startSlideshow() {
    if (slideshowTimerId !== null) {
      return;
    }
    slideshowTimerId = window.setInterval(showNextItem, slideshowIntervalInMilliseconds);
    lightboxPlay.innerHTML = "&#10073;&#10073;";
    lightboxPlay.setAttribute("aria-label", "Pause slideshow");
  }

  function stopSlideshow() {
    if (slideshowTimerId === null) {
      return;
    }
    window.clearInterval(slideshowTimerId);
    slideshowTimerId = null;
    lightboxPlay.innerHTML = "&#9654;";
    lightboxPlay.setAttribute("aria-label", "Start slideshow");
  }

  function toggleSlideshow() {
    if (slideshowTimerId === null) {
      startSlideshow();
    } else {
      stopSlideshow();
    }
  }

  lightboxClose.addEventListener("click", closeLightbox);
  lightboxNext.addEventListener("click", function () {
    stopSlideshow();
    showNextItem();
  });
  lightboxPrev.addEventListener("click", function () {
    stopSlideshow();
    showPreviousItem();
  });
  lightboxPlay.addEventListener("click", toggleSlideshow);

  lightbox.addEventListener("click", function (clickEvent) {
    // Tapping the dark backdrop (but not the media or controls) closes it.
    if (clickEvent.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener("keydown", function (keyEvent) {
    if (lightbox.hidden) {
      return;
    }
    if (keyEvent.key === "Escape") {
      closeLightbox();
    } else if (keyEvent.key === "ArrowRight") {
      stopSlideshow();
      showNextItem();
    } else if (keyEvent.key === "ArrowLeft") {
      stopSlideshow();
      showPreviousItem();
    }
  });

  // Basic swipe navigation for touch devices.
  let touchStartX = 0;
  lightboxStage.addEventListener("touchstart", function (touchEvent) {
    touchStartX = touchEvent.changedTouches[0].screenX;
  }, { passive: true });
  lightboxStage.addEventListener("touchend", function (touchEvent) {
    const horizontalDistance = touchEvent.changedTouches[0].screenX - touchStartX;
    if (Math.abs(horizontalDistance) < 40) {
      return;
    }
    stopSlideshow();
    if (horizontalDistance < 0) {
      showNextItem();
    } else {
      showPreviousItem();
    }
  });
</script>
</body>
</html>
