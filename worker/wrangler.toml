ALLOWED_ORIGIN = "https://jmacdonald263.github.io,http://127.0.0.1:8765,http://localhost:8765"
DRIVE_FOLDER_ID = "12r5Db_uWfNXa2eIHMx2artXkUgSaasLI"

# Secrets are NOT stored here. Set them once with:
